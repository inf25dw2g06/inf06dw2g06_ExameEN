paths:
  /users:
    get:
      tags:
        - Users
      summary: Lista todos os utilizadores (recurso público)
      security: []
      responses:
        200:
          description: Lista de utilizadores (sem passwords)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    username:
                      type: string
                    createdAt:
                      type: string