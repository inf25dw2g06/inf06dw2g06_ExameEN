paths:
  /auth/token:
    post:
      tags:
        - Autenticação
      summary: Autentica o utilizador e devolve um Bearer Token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: password123
      responses:
        200:
          description: Token emitido com sucesso
        401:
          description: Credenciais inválidas

  /torneios:
    get:
      tags:
        - Torneios
      summary: Lista os torneios do utilizador autenticado
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de torneios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Torneio'
        401:
          description: Token em falta ou inválido

    post:
      tags:
        - Torneios
      summary: Cria um novo torneio
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
                - jogo
              properties:
                nome:
                  type: string
                  example: Torneio de Verão
                jogo:
                  type: string
                  example: Valorant
      responses:
        201:
          description: Torneio criado
        401:
          description: Token em falta ou inválido

  /torneios/{id}:
    put:
      tags:
        - Torneios
      summary: Atualiza um torneio do utilizador
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                jogo:
                  type: string
      responses:
        200:
          description: Torneio atualizado
        401:
          description: Token em falta ou inválido
        404:
          description: Torneio não encontrado

    delete:
      tags:
        - Torneios
      summary: Elimina um torneio do utilizador
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Torneio eliminado
        401:
          description: Token em falta ou inválido