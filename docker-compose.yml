version: '3.8'

services:
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: torneios_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: torneios_db
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: secret
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./parte2
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped